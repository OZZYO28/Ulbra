<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <header class="bg-gray-500 text-white p-[15px] text-center ">
        <h1 class="text-xl sm:text-2xl md:text-3xl lg:text-5xl font-bold italic underline">Introdução ao Tailwind</h1>
    </header>
    
    <main class="p-10">

        <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <div class="border-2 rounded p-2 w-full bg-blue-200 hover:bg-blue-300 flex justify-center">
                <p>Texto 1</p>
            </div>

            <div class="border-2 rounded p-2 w-full bg-blue-200 flex justify-center">
                <p>Texto 2</p>
            </div>
            <div class="border-2 rounded p-2 w-full bg-blue-200 flex justify-center">
                <p>Texto 3</p>
            </div>
            <div class="border-2 rounded p-2 w-full bg-blue-200 flex justify-center">
                <p>Texto 4</p>
            </div>
            <div class="border-2 rounded p-2 w-full bg-blue-200 flex justify-center">
                <p>Texto 5</p>
            </div>
            <div class="border-2 rounded p-2 w-full bg-blue-200 flex justify-center">
                <p>Texto 6</p>
            </div>
        </section>

    </main>
</body>

</html>
